<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Astr0 — Prototipo de cuadrantes (HTML Canvas)</title>
  <style>
    html,body{height:100%;margin:0;background:#0b1020;color:#e6eef8;font-family:Inter,system-ui,Segoe UI,Roboto,sans-serif}
    #game{display:block;width:100vw;height:100vh;touch-action:none}
    .ui{position:fixed;left:12px;top:12px;background:rgba(0,0,0,.45);backdrop-filter:blur(6px);padding:10px 12px;border-radius:10px;font-size:13px;z-index:10;border:1px solid rgba(255,255,255,.08)}
    .ui h1{font-size:14px;margin:.2rem 0 .4rem;color:#bcd2ff}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .badge{padding:3px 8px;border-radius:999px;background:#16223d;border:1px solid #2b3f6b;color:#cfe0ff}
    .help{margin-top:6px;color:#9fb0d9}
    .help kbd{background:#111826;border:1px solid #2b3f6b;border-bottom-color:#1b2d53;padding:1px 4px;border-radius:4px;font-size:12px}
    .credits{position:fixed;right:12px;bottom:12px;color:#9fb0d9;font-size:12px;background:rgba(0,0,0,.35);padding:6px 8px;border-radius:8px;border:1px solid rgba(255,255,255,.08)}
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div class="ui">
    <h1>🧑‍🚀 Astr0 — Demo por cuadrantes</h1>
    <div class="row">
      <span class="badge" id="planet">Planeta: Violeta‑01</span>
      <span class="badge" id="quad">Cuadrante: (0,0)</span>
      <span class="badge" id="fps">FPS: —</span>
    </div>
    <div class="help">
      <div><kbd>WASD</kbd> mover • clic izq: disparar • mouse: apuntar</div>
      <div><kbd>E</kbd> teletransportar al cuadrante hacia el cursor • borde: pasa al vecino</div>
      <div><kbd>R</kbd> centrar jugador • <kbd>P</kbd> pausa</div>
    </div>
  </div>
  <div class="credits">v0.1 — Cuadrantes estilo tablero + disparo con arco</div>

<script>
(() => {
  // ====== Setup Canvas ======
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  const DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  function resize(){
    canvas.width = Math.floor(window.innerWidth * DPR);
    canvas.height = Math.floor(window.innerHeight * DPR);
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
  }
  window.addEventListener('resize', resize);
  resize();

  // ====== World / Quadrants ======
  const QUAD_SIZE = { w: 1920, h: 1080 }; // cuadrante lógico base (antes de escalar por DPR)
  const WORLD_BOUNDS = { minX: -4, maxX: 4, minY: -4, maxY: 4 }; // 9x9 como ejemplo

  // ====== UI refs ======
  const quadEl = document.getElementById('quad');
  const fpsEl = document.getElementById('fps');

  // ====== Input ======
  const keys = new Set();
  const mouse = { x: 0, y: 0, worldX: 0, worldY: 0, down: false };
  window.addEventListener('keydown', (e) => { keys.add(e.key.toLowerCase()); });
  window.addEventListener('keyup', (e) => { keys.delete(e.key.toLowerCase()); });
  canvas.addEventListener('pointermove', (e) => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = (e.clientX - rect.left) * DPR;
    mouse.y = (e.clientY - rect.top) * DPR;
  });
  canvas.addEventListener('pointerdown', (e) => { mouse.down = true; });
  canvas.addEventListener('pointerup', (e) => { mouse.down = false; });
  canvas.addEventListener('contextmenu', (e) => e.preventDefault());

  // ====== Math / Utils ======
  function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }
  function len(x, y){ return Math.hypot(x, y); }
  function normalize(x, y){ const L = len(x,y)||1; return { x: x/L, y: y/L }; }
  // seedable RNG per cuadrante
  function hash2i(x, y){
    let h = x * 374761393 + y * 668265263; h = (h ^ (h >> 13)) * 1274126177; return (h ^ (h >> 16)) >>> 0;
  }
  function mulberry32(a){ return function(){ let t = a += 0x6D2B79F5; t = Math.imul(t ^ t >>> 15, t | 1); t ^= t + Math.imul(t ^ t >>> 7, t | 61); return ((t ^ t >>> 14) >>> 0) / 4294967296; } }

  // ====== Player ======
  const player = {
    pos: { x: QUAD_SIZE.w/2, y: QUAD_SIZE.h/2 },
    speed: 360, // px/s
    radius: 14,
    fireCooldown: 0,
    fireRate: 0.18, // s entre flechas
  };

  // ====== Quadrant State ======
  const state = {
    qx: 0, qy: 0,
    paused: false,
    arrows: [],
    lastTime: performance.now(),
  };
  updateQuadLabel();

  // ====== Entities by Quadrant (decor) ======
  function genDecorFor(qx, qy){
    const rnd = mulberry32(hash2i(qx, qy));
    const rocks = [];
    const plants = [];
    const countR = 8 + Math.floor(rnd()*10);
    const countP = 12 + Math.floor(rnd()*12);
    for(let i=0;i<countR;i++){
      rocks.push({ x: rnd()*QUAD_SIZE.w, y: rnd()*QUAD_SIZE.h, r: 10 + rnd()*26 });
    }
    for(let i=0;i<countP;i++){
      plants.push({ x: rnd()*QUAD_SIZE.w, y: rnd()*QUAD_SIZE.h, r: 6 + rnd()*14 });
    }
    return { rocks, plants, tint: 0.82 + (rnd()*0.16) };
  }
  const decorCache = new Map();
  function decorKey(qx,qy){ return qx+','+qy; }
  function getDecor(qx,qy){
    const k = decorKey(qx,qy);
    if(!decorCache.has(k)) decorCache.set(k, genDecorFor(qx,qy));
    return decorCache.get(k);
  }

  // ====== Camera ======
  function worldToScreen(wx, wy){
    // cada cuadrante ocupa QUAD_SIZE; cámara centrada en cuadrante actual
    const ox = state.qx*QUAD_SIZE.w;
    const oy = state.qy*QUAD_SIZE.h;
    return { x: (wx - ox) * (canvas.width/QUAD_SIZE.w), y: (wy - oy) * (canvas.height/QUAD_SIZE.h) };
  }
  function screenToWorld(sx, sy){
    const wx = sx * (QUAD_SIZE.w/canvas.width) + state.qx*QUAD_SIZE.w;
    const wy = sy * (QUAD_SIZE.h/canvas.height) + state.qy*QUAD_SIZE.h;
    return { x: wx, y: wy };
  }

  // ====== Teleport logic ======
  function teleportTowardMouse(){
    // decide borde más cercano según ángulo hacia el cursor
    const pScr = worldToScreen(player.pos.x + state.qx*QUAD_SIZE.w, player.pos.y + state.qy*QUAD_SIZE.h);
    const dx = mouse.x - pScr.x, dy = mouse.y - pScr.y;
    if(Math.abs(dx) > Math.abs(dy)){
      if(dx > 0) tryMoveQuadrant(1, 0, 'right'); else tryMoveQuadrant(-1, 0, 'left');
    } else {
      if(dy > 0) tryMoveQuadrant(0, 1, 'down'); else tryMoveQuadrant(0, -1, 'up');
    }
  }
  function tryMoveQuadrant(dx, dy, edge){
    const nx = clamp(state.qx + dx, WORLD_BOUNDS.minX, WORLD_BOUNDS.maxX);
    const ny = clamp(state.qy + dy, WORLD_BOUNDS.minY, WORLD_BOUNDS.maxY);
    if(nx === state.qx && ny === state.qy) return; // borde del mundo
    state.qx = nx; state.qy = ny;
    // coloca al jugador en el borde opuesto para coherencia
    if(edge === 'right'){ player.pos.x = 10; }
    if(edge === 'left'){ player.pos.x = QUAD_SIZE.w-10; }
    if(edge === 'down'){ player.pos.y = 10; }
    if(edge === 'up'){ player.pos.y = QUAD_SIZE.h-10; }
    updateQuadLabel();
  }
  function updateQuadLabel(){ quadEl.textContent = `Cuadrante: (${state.qx},${state.qy})`; }

  // ====== Armas ======
  function shoot(){
    if(player.fireCooldown > 0) return;
    const pScreen = worldToScreen(player.pos.x + state.qx*QUAD_SIZE.w, player.pos.y + state.qy*QUAD_SIZE.h);
    const vx = mouse.x - pScreen.x, vy = mouse.y - pScreen.y;
    const dir = normalize(vx, vy);
    const speed = 900; // px/s
    state.arrows.push({
      x: player.pos.x, y: player.pos.y,
      vx: dir.x * speed, vy: dir.y * speed,
      life: 1.2 // segundos
    });
    player.fireCooldown = player.fireRate;
  }

  // ====== Game Loop ======
  let fpsSmoothed = 60;
  function step(){
    const now = performance.now();
    const dt = Math.min(0.033, (now - state.lastTime) / 1000);
    state.lastTime = now;
    if(!state.paused){
      update(dt);
      render();
    } else {
      render(true);
    }
    const fps = 1/dt; fpsSmoothed = fpsSmoothed*0.9 + fps*0.1; fpsEl.textContent = 'FPS: ' + fpsSmoothed.toFixed(0);
    requestAnimationFrame(step);
  }

  function update(dt){
    // ===== Input acciones de un frame =====
    if(keys.has('e')){ keys.delete('e'); teleportTowardMouse(); }
    if(keys.has('r')){ keys.delete('r'); player.pos.x = QUAD_SIZE.w/2; player.pos.y = QUAD_SIZE.h/2; }
    if(keys.has('p')){ keys.delete('p'); state.paused = !state.paused; }

    // ===== Movimiento =====
    let ax = 0, ay = 0;
    if(keys.has('w') || keys.has('arrowup')) ay -= 1;
    if(keys.has('s') || keys.has('arrowdown')) ay += 1;
    if(keys.has('a') || keys.has('arrowleft')) ax -= 1;
    if(keys.has('d') || keys.has('arrowright')) ax += 1;
    const dir = normalize(ax, ay);
    player.pos.x += dir.x * player.speed * dt;
    player.pos.y += dir.y * player.speed * dt;

    // ===== Límite de cuadrante + paso al vecino por borde =====
    if(player.pos.x < 0){ tryMoveQuadrant(-1,0,'left'); }
    if(player.pos.x > QUAD_SIZE.w){ tryMoveQuadrant(1,0,'right'); }
    if(player.pos.y < 0){ tryMoveQuadrant(0,-1,'up'); }
    if(player.pos.y > QUAD_SIZE.h){ tryMoveQuadrant(0,1,'down'); }

    // ===== Disparo =====
    if(mouse.down) shoot();
    if(player.fireCooldown > 0) player.fireCooldown -= dt;

    for(let i=state.arrows.length-1;i>=0;i--){
      const a = state.arrows[i];
      a.x += a.vx * dt; a.y += a.vy * dt; a.life -= dt;
      // si sale del cuadrante actual, la flecha sigue en el mismo cuadrante (simple), o se pierde
      if(a.x < -40 || a.x > QUAD_SIZE.w+40 || a.y < -40 || a.y > QUAD_SIZE.h+40 || a.life <= 0){
        state.arrows.splice(i,1);
      }
    }
  }

  function render(paused=false){
    // fondo con gradiente violeta y textura ligera por cuadrante
    const decor = getDecor(state.qx, state.qy);
    const tint = decor.tint;
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Fondo
    const g = ctx.createLinearGradient(0,0,canvas.width,canvas.height);
    g.addColorStop(0, `rgba(${Math.floor(90*tint)}, ${Math.floor(35*tint)}, 140, 1)`);
    g.addColorStop(1, `rgba(${Math.floor(35*tint)}, ${Math.floor(10*tint)}, 70, 1)`);
    ctx.fillStyle = g; ctx.fillRect(0,0,canvas.width,canvas.height);

    // Decor (rocas y plantas)
    ctx.save();
    const sx = canvas.width/QUAD_SIZE.w, sy = canvas.height/QUAD_SIZE.h;
    ctx.scale(sx, sy);
    ctx.globalAlpha = 0.7;
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    for(const r of decor.rocks){ ctx.beginPath(); ctx.arc(r.x, r.y, r.r, 0, Math.PI*2); ctx.fill(); }
    ctx.globalAlpha = 0.5; ctx.fillStyle = 'rgba(0,255,200,0.10)';
    for(const p of decor.plants){ ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill(); }
    ctx.globalAlpha = 1;

    // Flechas
    ctx.strokeStyle = '#e6eef8';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    for(const a of state.arrows){
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(a.x - a.vx*0.03, a.y - a.vy*0.03); // pequeña estela
      ctx.stroke();
      // punta
      const ang = Math.atan2(a.vy, a.vx);
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(a.x - Math.cos(ang-0.4)*10, a.y - Math.sin(ang-0.4)*10);
      ctx.lineTo(a.x - Math.cos(ang+0.4)*10, a.y - Math.sin(ang+0.4)*10);
      ctx.fillStyle = '#e6eef8';
      ctx.fill();
    }

    // Jugador (astronauta minimalista)
    // cuerpo
    ctx.fillStyle = paused ? '#8aa8ff' : '#ffffff';
    ctx.beginPath(); ctx.arc(player.pos.x, player.pos.y, player.radius, 0, Math.PI*2); ctx.fill();
    // visor casco
    ctx.fillStyle = '#0b1020';
    ctx.beginPath(); ctx.arc(player.pos.x, player.pos.y-3, player.radius*0.55, 0, Math.PI*2); ctx.fill();
    // arco luminoso indicando dirección de mira
    const pScreen = worldToScreen(player.pos.x + state.qx*QUAD_SIZE.w, player.pos.y + state.qy*QUAD_SIZE.h);
    const aim = normalize(mouse.x - pScreen.x, mouse.y - pScreen.y);
    const bowR = player.radius + 6;
    ctx.strokeStyle = '#b1c6ff'; ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(player.pos.x, player.pos.y, bowR, Math.atan2(aim.y, aim.x)-0.9, Math.atan2(aim.y, aim.x)+0.9);
    ctx.stroke();

    // marco sutil del cuadrante
    ctx.setLineDash([8,6]);
    ctx.strokeStyle = 'rgba(230,238,248,0.22)';
    ctx.lineWidth = 2;
    ctx.strokeRect(4,4,QUAD_SIZE.w-8,QUAD_SIZE.h-8);

    ctx.restore();

    if(paused){
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = '#e6eef8';
      ctx.font = `${Math.floor(24*DPR)}px system-ui,Segoe UI,Roboto`;
      ctx.textAlign = 'center';
      ctx.fillText('Pausado', canvas.width/2, canvas.height/2);
    }
  }

  // ====== Start ======
  state.lastTime = performance.now();
  requestAnimationFrame(step);
})();
</script>
</body>
</html>
